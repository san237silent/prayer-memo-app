<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>할 일 목록</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>나의 할 일 목록</h1>
    <p>할 일을 입력하고 추가해 보세요.</p>

    <div class="input-area">
      <input id="taskInput" type="text" placeholder="예: 보고서 초안 쓰기">
      <button id="addButton">추가</button>
      <button id="clearButton" class="secondary-btn">전체 삭제</button>
    </div>

    <p id="statusText">전체 0개 / 완료 0개</p>

    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
