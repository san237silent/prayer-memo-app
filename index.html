<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>기도제목 메모장</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>기도제목 메모장</h1>
      <p>기도제목을 기록하고, 응답된 항목을 체크해 보세요.</p>
    </header>

    <section class="form-card">
      <div class="form-group">
        <label for="titleInput">제목</label>
        <input id="titleInput" type="text" placeholder="예: 가족 건강, 딸 진로, 사역 지혜">
      </div>

      <div class="form-group">
        <label for="contentInput">내용</label>
        <textarea id="contentInput" rows="15" placeholder="구체적인 기도 내용을 적어 보세요."></textarea>
      </div>

      <div class="button-row">
        <button id="addButton">저장</button>
        <button id="clearAllButton" class="secondary-btn">전체 삭제</button>
      </div>
    </section>

    <section class="status-card">
      <p id="statusText">전체 0개 / 응답됨 0개</p>
    </section>

    <section>
      <div id="emptyMessage" class="empty-message">
        아직 저장된 기도제목이 없습니다.
      </div>
      <div id="memoList" class="memo-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
